services:
    pg:
        image: postgres:16-alpine
        container_name: kryvea-pg
        restart: unless-stopped
        environment:
            - POSTGRES_USER=kryvea
            - POSTGRES_PASSWORD=kryveapass
            - POSTGRES_DB=kryvea
        volumes:
            - ./.data/postgres:/var/lib/postgresql/data
        networks:
            - kryvea-data
        expose:
            - 5432
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U kryvea -d kryvea"]
            interval: 5s
            timeout: 3s
            retries: 10

    app:
        build: app
        image: kryvea-app:latest
        container_name: kryvea-app
        restart: unless-stopped
        environment:
            - KRYVEA_ADDR=0.0.0.0:8080
            - KRYVEA_ROOT_PATH=/
            - KRYVEA_PG_DSN=postgres://kryvea:kryveapass@kryvea-pg:5432/kryvea?sslmode=disable
            - KRYVEA_FILES_DIR=/var/lib/kryvea/files
            - KRYVEA_ADMIN_USER=kryvea
            - KRYVEA_ADMIN_PASS=kryveapassword
            - KRYVEA_LOG_DIRECTORY=/var/log/kryvea/
            - KRYVEA_LOG_MAX_SIZE_MB=10
            - KRYVEA_LOG_MAX_BACKUPS=5
            - KRYVEA_LOG_MAX_AGE_DAYS=0
            - KRYVEA_LOG_COMPRESS=true
        volumes:
            - ./.data/log:/var/log/kryvea/
            - ./.data/files:/var/lib/kryvea/files
        depends_on:
            pg:
                condition: service_healthy
        networks:
            - kryvea-net
            - kryvea-data
        expose:
            - 8080

    web:
        build: web
        container_name: kryvea-web
        restart: unless-stopped
        volumes:
            - ./.data/ssl:/etc/nginx/ssl
        depends_on:
            - app
        ports:
            - 443:443
        networks:
            - kryvea-net

networks:
    kryvea-net:
        driver: bridge
    kryvea-data:
        driver: bridge
